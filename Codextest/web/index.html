<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PulseMind AI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="shell">
      <section class="brand-panel">
        <p class="eyebrow">Your Private Assistant</p>
        <h1 id="appName">PulseMind AI</h1>
        <p class="subtitle">
          A local, self-hosted chat app you can brand and control with your own API key.
        </p>
        <div class="chip-row">
          <span class="chip" id="modelChip">model: loading...</span>
          <button id="clearBtn" class="ghost-btn" type="button">Clear chat</button>
        </div>
      </section>

      <section class="chat-panel">
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <textarea
            id="input"
            rows="3"
            maxlength="4000"
            placeholder="Ask anything..."
            required
          ></textarea>
          <div class="composer-actions">
            <span id="status" class="status">Ready</span>
            <button id="sendBtn" class="send-btn" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
